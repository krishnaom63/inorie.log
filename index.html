<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inorie.log｜軍師に聞く</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#f0ede8;font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.screen{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center}
.hidden{display:none!important}
.logo{font-size:12px;letter-spacing:6px;color:#c8a84b;margin-bottom:8px}
h1{font-size:32px;font-weight:700;margin-bottom:8px}
.sub{font-size:13px;color:#888;margin-bottom:40px;text-align:center}
.btn{width:100%;padding:18px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;font-family:'Noto Sans JP',sans-serif}
.btn-gold{background:#c8a84b;color:#0f0f1a}
.btn-outline{background:transparent;color:#c8a84b;border:1.5px solid #c8a84b}
.btn-ghost{background:transparent;color:#666;border:1px solid #333;margin-top:4px}
.btn-danger{background:#e57373;color:#fff}
.btn-copy{background:#1e1e2e;color:#c8a84b;border:1px solid #c8a84b}
.error{color:#e57373;font-size:13px;text-align:center;margin-bottom:16px;width:100%}
.wave{display:flex;align-items:flex-end;gap:5px;height:56px;margin-bottom:24px}
.bar{width:7px;border-radius:4px;background:#c8a84b;height:8px;transition:height 0.15s}
.bar.active{animation:wave 0.5s ease-in-out infinite alternate}
.bar:nth-child(2).active{animation-delay:.07s}
.bar:nth-child(3).active{animation-delay:.14s}
.bar:nth-child(4).active{animation-delay:.21s}
.bar:nth-child(5).active{animation-delay:.28s}
.bar:nth-child(6).active{animation-delay:.35s}
.bar:nth-child(7).active{animation-delay:.42s}
@keyframes wave{from{height:8px}to{height:44px}}
.transcript{width:100%;background:#1a1a2e;border-radius:10px;padding:14px;min-height:90px;font-size:13px;color:#aaa;line-height:1.8;margin-bottom:20px}
.thinking{font-size:17px;color:#c8a84b;margin-bottom:20px;text-align:center;min-height:28px}
.dots{display:flex;gap:7px;margin-top:8px}
.dot{width:9px;height:9px;border-radius:50%;background:#c8a84b;animation:dot 0.6s ease-in-out infinite alternate}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes dot{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.2)}}
.cards{width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.card{background:#1e1e2e;border-radius:12px;padding:16px 18px;border-left:3px solid #c8a84b}
.card-title{font-size:12px;letter-spacing:2px;color:#c8a84b;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-body{font-size:14px;color:#d0ccc8;line-height:1.9;white-space:pre-wrap}
.card.omote{border-left-color:#4caf50}.card.omote .card-title{color:#4caf50}
.card.ura{border-left-color:#e57373}.card.ura .card-title{color:#e57373}
.card.next{border-left-color:#5b8dd9}.card.next .card-title{color:#5b8dd9}
.card.shintak{border-left-color:#9b59b6}.card.shintak .card-title{color:#9b59b6}
.page-top{padding-top:40px;justify-content:flex-start}
textarea{width:100%;height:140px;background:#1e1e2e;color:#f0ede8;border:1.5px solid #c8a84b;border-radius:10px;padding:12px;font-size:14px;line-height:1.7;resize:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:12px}
</style>
</head>
<body>

<!-- ホーム画面 -->

<div id="home" class="screen">
  <p class="logo">INORIE.LOG</p>
  <h1>軍師に聞く</h1>
  <p class="sub">声を記録し、AIが戦略を授ける</p>
  <p id="homeError" class="error hidden"></p>
  <button class="btn btn-gold" onclick="startRec('gunshi')">🎙️ 録音を始める</button>
  <button class="btn btn-outline" onclick="startRec('shintak')">⛩️ 神託モード</button>
  <p style="color:#444;font-size:12px;margin-top:12px">マイクが使えない場合 ↓</p>
  <button class="btn btn-ghost" onclick="showText()">✍️ テキストで入力する</button>
</div>

<!-- テキスト入力 -->

<div id="textInput" class="screen hidden">
  <p class="logo">INORIE.LOG</p>
  <h1 style="font-size:22px;margin-bottom:16px">テキストで入力</h1>
  <p id="textError" class="error hidden"></p>
  <textarea id="textArea" placeholder="会議の内容・悩み・アイデアなどを入力してください…"></textarea>
  <button class="btn btn-gold" onclick="analyzeText('gunshi')">🏯 軍師に解析させる</button>
  <button class="btn btn-outline" onclick="analyzeText('shintak')">⛩️ 神託を受け取る</button>
  <button class="btn btn-ghost" onclick="show('home')">← 戻る</button>
</div>

<!-- 録音中 -->

<div id="recording" class="screen hidden">
  <p class="logo">録音中</p>
  <div class="wave" id="wave">
    <div class="bar" id="b1"></div><div class="bar" id="b2"></div>
    <div class="bar" id="b3"></div><div class="bar" id="b4"></div>
    <div class="bar" id="b5"></div><div class="bar" id="b6"></div>
    <div class="bar" id="b7"></div>
  </div>
  <div class="transcript" id="recTranscript">話し始めてください…</div>
  <button class="btn btn-danger" id="stopBtn" onclick="stopRec()">⏹ 停止して解析する</button>
  <button class="btn btn-ghost" onclick="cancelRec()">キャンセル</button>
</div>

<!-- 神託録音中 -->

<div id="shintakRec" class="screen hidden">
  <p class="logo">神託モード</p>
  <p style="color:#c8a84b;font-size:14px;margin-bottom:20px;text-align:center">悩みや祈りを、声に出してください</p>
  <div class="wave">
    <div class="bar" id="sb1"></div><div class="bar" id="sb2"></div>
    <div class="bar" id="sb3"></div><div class="bar" id="sb4"></div>
    <div class="bar" id="sb5"></div><div class="bar" id="sb6"></div>
    <div class="bar" id="sb7"></div>
  </div>
  <div class="transcript" id="shintakTranscript">話し始めてください…</div>
  <button class="btn btn-gold" onclick="stopRec()">⛩️ 神託を受け取る</button>
  <button class="btn btn-ghost" onclick="cancelRec()">キャンセル</button>
</div>

<!-- 解析中 -->

<div id="analyzing" class="screen hidden">
  <div style="font-size:48px;margin-bottom:20px">🏯</div>
  <p class="thinking" id="thinkingText">軍師が思考中…</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- 神託解析中 -->

<div id="shintakAnalyzing" class="screen hidden">
  <div style="font-size:48px;margin-bottom:20px">⛩️</div>
  <p class="thinking" id="shintakThinking">神様に繋いでいます…</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- 結果 -->

<div id="result" class="screen page-top hidden">
  <p class="logo" style="margin-bottom:16px">軍師解析結果</p>
  <div class="cards">
    <div class="card"><div class="card-title">📋 要約</div><div class="card-body" id="resSummary"></div></div>
    <div class="card omote"><div class="card-title">⚔️ 表の策</div><div class="card-body" id="resOmote"></div></div>
    <div class="card ura"><div class="card-title">🗡️ 裏の策</div><div class="card-body" id="resUra"></div></div>
    <div class="card next"><div class="card-title">✅ ネクストアクション</div><div class="card-body" id="resNext"></div></div>
  </div>
  <button class="btn btn-gold" id="copyBtn" onclick="copyAll()">📋 全部コピー</button>
  <button class="btn btn-ghost" onclick="reset()">もう一度録音する</button>
</div>

<!-- 神託結果 -->

<div id="shintakResult" class="screen hidden">
  <p class="logo" style="margin-bottom:16px">神 託</p>
  <div class="cards">
    <div class="card shintak"><div class="card-title">⛩️ 神様からのメッセージ</div><div class="card-body" id="shintakMsg"></div></div>
  </div>
  <button class="btn btn-copy" id="shintakCopyBtn" onclick="copyShintaku()">📋 コピー</button>
  <button class="btn btn-ghost" onclick="reset()">ホームに戻る</button>
</div>

<script>
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
let recog = null, mode = "gunshi", transcript = "";
const thinking = ["軍師が思考中…","戦局を見極めている…","策を練っている…","深く考察している…","智謀を巡らせている…"];
const shintakThinking = ["神様に繋いでいます…","祈りを受け取っています…","神託を紡いでいます…"];
let thinkTimer = null;

function show(id){
  ["home","textInput","recording","shintakRec","analyzing","shintakAnalyzing","result","shintakResult"].forEach(s=>document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo(0,0);
}
function showText(){show("textInput")}
function setWave(prefix,active){
  for(let i=1;i<=7;i++){
    const b=document.getElementById((prefix||"b")+i);
    if(b){active?b.classList.add("active"):b.classList.remove("active")}
  }
}

function startRec(m){
  mode=m; transcript="";
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showError("homeError","このブラウザは音声認識に対応していません。");return;}
  recog=new SR(); recog.lang="ja-JP"; recog.continuous=true; recog.interimResults=true;
  recog.onresult=e=>{
    let t=""; for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;
    transcript=t;
    const el=document.getElementById(m==="shintak"?"shintakTranscript":"recTranscript");
    if(el)el.textContent=t||"話し始めてください…";
  };
  recog.onerror=()=>{showError("homeError","マイクへのアクセスを許可してください。");show("home");};
  recog.start();
  show(m==="shintak"?"shintakRec":"recording");
  setWave(m==="shintak"?"sb":"b",true);
}

function stopRec(){
  if(recog)recog.stop(); setWave("b",false); setWave("sb",false);
  if(!transcript.trim()){showError("homeError","音声が認識されませんでした。もう一度お試しください。");show("home");return;}
  runAnalyze(transcript);
}
function cancelRec(){if(recog)recog.stop();setWave("b",false);setWave("sb",false);show("home");}

function analyzeText(m){
  mode=m;
  const t=document.getElementById("textArea").value.trim();
  if(!t){showError("textError","テキストを入力してください。");return;}
  transcript=t; runAnalyze(t);
}

function runAnalyze(text){
  const isS=mode==="shintak";
  show(isS?"shintakAnalyzing":"analyzing");
  let i=0;
  const arr=isS?shintakThinking:thinking;
  const el=document.getElementById(isS?"shintakThinking":"thinkingText");
  thinkTimer=setInterval(()=>{i=(i+1)%arr.length;if(el)el.textContent=arr[i];},1200);

  const sys=isS
    ?`あなたは神秘的な巫女・神託の声です。語りかけるように、温かく、詩的に気づきのメッセージを200文字以内で伝えてください。`
    :`あなたは戦国時代の軍師です。重厚で端的な武将口調で話します。必ず以下のJSON形式のみで返答してください：{"summary":"要約3行以内","omote":"表の策2〜3つ箇条書き","ura":"裏の策2〜3つ箇条書き","next":"今日できる具体的な行動1つ"}`;

  fetch(ANTHROPIC_API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:sys,
      messages:[{role:"user",content:isS?`悩み：${text}`:`分析せよ：${text}`}]
    })
  })
  .then(r=>r.json())
  .then(d=>{
    clearInterval(thinkTimer);
    const txt=d.content?.[0]?.text||"";
    if(isS){document.getElementById("shintakMsg").textContent=txt;show("shintakResult");}
    else{
      try{
        const j=JSON.parse(txt.replace(/```json|```/g,"").trim());
        document.getElementById("resSummary").textContent=j.summary||"";
        document.getElementById("resOmote").textContent=j.omote||"";
        document.getElementById("resUra").textContent=j.ura||"";
        document.getElementById("resNext").textContent=j.next||"";
      }catch{document.getElementById("resSummary").textContent=txt;}
      show("result");
    }
  })
  .catch(()=>{clearInterval(thinkTimer);showError("homeError","解析エラーが発生しました。");show("home");});
}

function copyAll(){
  const t=`【軍師解析結果】\n\n📋 要約\n${document.getElementById("resSummary").textContent}\n\n⚔️ 表の策\n${document.getElementById("resOmote").textContent}\n\n🗡️ 裏の策\n${document.getElementById("resUra").textContent}\n\n✅ ネクストアクション\n${document.getElementById("resNext").textContent}`;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById("copyBtn");b.textContent="✅ コピーしました！";
    setTimeout(()=>b.textContent="📋 全部コピー",2000);
  });
}
function copyShintaku(){
  navigator.clipboard.writeText(document.getElementById("shintakMsg").textContent).then(()=>{
    const b=document.getElementById("shintakCopyBtn");b.textContent="✅ コピーしました";
    setTimeout(()=>b.textContent="📋 コピー",2000);
  });
}
function reset(){document.getElementById("textArea").value="";transcript="";show("home");}
function showError(id,msg){const e=document.getElementById(id);if(e){e.textContent=msg;e.classList.remove("hidden");setTimeout(()=>e.classList.add("hidden"),4000);}}
</script>

</body>
</html>
